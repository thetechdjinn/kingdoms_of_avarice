<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Kingdoms of Avarice</title>
    <link rel="stylesheet" href="/src/admin.css" />
  </head>
  <body>
    <div id="admin-app">
      <nav id="main-nav">
        <div class="nav-brand">Kingdoms of Avarice</div>
        <div class="nav-spacer"></div>
        <div class="nav-user-menu">
          <button class="nav-user-btn" id="nav-username">User</button>
          <div class="dropdown-menu" id="user-dropdown">
            <a href="/" class="dropdown-item">Game</a>
            <div class="dropdown-section" id="developer-menu">
              <div class="dropdown-header">Developer</div>
              <a href="/editor.html" class="dropdown-item indent">Room Editor</a>
            </div>
            <div class="dropdown-section" id="admin-menu">
              <div class="dropdown-header">Admin</div>
              <a href="/admin.html" class="dropdown-item indent active">User Management</a>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="logout-btn">Logout</button>
          </div>
        </div>
      </nav>
      
      <main id="admin-content">
        <div id="access-denied" style="display: none;">
          <h1>Access Denied</h1>
          <p>You do not have permission to access this page.</p>
          <a href="/">Return to Game</a>
        </div>
        
        <div id="admin-panel" style="display: none;">
          <h1>User Management</h1>
          
          <section id="pending-users-section">
            <h2>Pending Approval</h2>
            <p class="section-desc">Users waiting for approval to play the game.</p>
            <div id="pending-users-list">
              <p class="loading">Loading...</p>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
