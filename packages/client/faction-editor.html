<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faction Editor - Kingdoms of Avarice</title>
    <link rel="stylesheet" href="/src/editor.css" />
    <link rel="stylesheet" href="/src/faction-editor.css" />
  </head>
  <body>
    <div id="editor-app">
      <nav id="main-nav"></nav>

      <div id="editor-layout">
        <aside id="faction-list-panel">
          <div class="panel-header">
            <h2>Factions</h2>
            <button id="new-faction-btn" class="btn-primary">+ New</button>
          </div>
          <div class="list-search">
            <input type="text" id="search-input" placeholder="Search factions..." />
          </div>
          <ul id="faction-list"></ul>
          <div class="panel-footer">
            <span id="faction-count" class="list-count"></span>
            <div class="footer-buttons">
              <button id="export-btn" class="btn-small">Export</button>
            </div>
          </div>
        </aside>

        <main id="faction-editor-panel">
          <div id="no-faction-selected">
            <div class="empty-state">
              <div class="empty-icon">&gt;_</div>
              <p>Select a faction from the list or create a new one.</p>
            </div>
          </div>

          <form id="faction-form" style="display: none;">
            <div class="form-header">
              <h2 id="faction-form-title">Edit Faction</h2>
              <span id="faction-id-display"></span>
            </div>

            <div class="top-row">
              <div class="form-section top-left">
                <h3>Details</h3>
                <div class="form-group">
                  <label for="faction-name">Name <span class="required">*</span></label>
                  <input type="text" id="faction-name" required placeholder="Arindale Merchants Guild" />
                </div>
                <div class="form-group">
                  <label for="faction-type">Type</label>
                  <select id="faction-type">
                    <option value="city">City</option>
                    <option value="tribal">Tribal</option>
                    <option value="merchant">Merchant</option>
                    <option value="guild">Guild</option>
                  </select>
                  <span class="hint-inline">Organizational label, no gameplay effect</span>
                </div>
                <div class="form-group">
                  <label for="faction-description">Description</label>
                  <textarea id="faction-description" rows="4" placeholder="A brief description of this faction..."></textarea>
                </div>
              </div>

              <div class="form-section top-right">
                <h3>Linked NPCs</h3>
                <p class="section-hint">NPCs assigned to this faction via the NPC Editor's Merchant tab.</p>
                <div id="linked-npcs">
                  <p class="hint">Select a faction to see linked NPCs</p>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn-primary">Save Faction</button>
              <button type="button" id="duplicate-faction-btn" class="btn-secondary">Duplicate</button>
              <div class="spacer"></div>
              <button type="button" id="delete-faction-btn" class="btn-danger">Delete</button>
            </div>
          </form>
        </main>
      </div>
    </div>

    <script type="module" src="/src/faction-editor.ts"></script>
  </body>
</html>
