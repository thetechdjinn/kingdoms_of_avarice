<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progression Table Editor - Kingdoms of Avarice</title>
    <link rel="stylesheet" href="/src/editor.css" />
    <link rel="stylesheet" href="/src/progression-table-editor.css" />
  </head>
  <body>
    <div id="editor-app">
      <nav id="main-nav"></nav>

      <main id="progression-table-panel">
        <div class="table-header">
          <h2>Progression Table</h2>
          <p class="hint">Define the XP and essence requirements for each character level. Level 1 is implicit (no requirements).</p>
        </div>

        <div id="status-message" class="status-message" style="display: none;"></div>

        <div class="table-container">
          <table id="progression-table">
            <thead>
              <tr>
                <th class="col-level">Level</th>
                <th class="col-xp">XP Required</th>
                <th class="col-essence">Essence Required</th>
                <th class="col-growth">Growth</th>
                <th class="col-total">Total XP</th>
                <th class="col-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="table-body">
            </tbody>
            <tfoot>
              <tr id="add-row">
                <td>
                  <label for="new-level" class="sr-only">Level</label>
                  <input type="number" id="new-level" min="2" placeholder="Lvl" class="input-level" />
                </td>
                <td>
                  <label for="new-xp" class="sr-only">XP Required</label>
                  <input type="number" id="new-xp" min="1" placeholder="XP required" class="input-xp" />
                </td>
                <td>
                  <label for="new-essence" class="sr-only">Essence Required</label>
                  <input type="number" id="new-essence" min="0" placeholder="Essence required" class="input-essence" />
                </td>
                <td class="col-calculated">--</td>
                <td class="col-calculated">--</td>
                <td>
                  <button id="add-level-btn" class="btn-add">Add Level</button>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </main>
    </div>

    <script type="module" src="/src/progression-table-editor.ts"></script>
  </body>
</html>
